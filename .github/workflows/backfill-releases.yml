name: Backfill Releases

# One-time, manually triggered. Turns every version section of CHANGELOG.md into
# a GitHub Release (idempotent — re-runnable), then retires CHANGELOG.md since new
# releases now come from annotated tag messages (see release.yml).
#
# Run it from the Actions tab → "Backfill Releases" → "Run workflow" after this
# branch is merged to the default branch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full tag list so every changelog version can be matched

      - name: Create a GitHub Release per changelog version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/backfill_releases.py

      - name: Retire CHANGELOG.md
        run: |
          set -euo pipefail
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md already removed — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm CHANGELOG.md
          git commit -m "chore: retire CHANGELOG.md in favour of GitHub Releases

          History is preserved on the Releases page; new releases are published
          from annotated tag messages by .github/workflows/release.yml."
          git push
