<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v-shipper - Docker Volume Migration</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <form class="login-form" onsubmit="event.preventDefault(); login();">
            <h2>v-shipper</h2>
            <p style="text-align: center; color: #7f8c8d; margin-bottom: 20px;">Docker Volume Migration</p>
            
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn success" style="width: 100%;">Login</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <header>
            <div class="container">
                <h1>v-shipper</h1>
                <div class="header-controls">
                    <button class="btn" onclick="loadPools()">🔄 Refresh</button>
                    <span style="margin: 0 10px; vertical-align: middle; color: white;">
                        Logged in as: <strong id="currentUser">admin</strong>
                    </span>
                    <button class="btn danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <div class="container">
            <!-- Pools Section -->
            <div class="section">
                <h2>📁 Storage Pools</h2>
                <div id="poolsList"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->

    <!-- Volumes Modal -->
    <div id="volumesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Volumes</h3>
                <button class="close-btn" onclick="closeModal('volumesModal')">×</button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <!-- Migrate Modal -->
    <div id="migrateModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Backup Modal -->
    <div id="backupModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Progress Modal -->
    <div id="progressModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
