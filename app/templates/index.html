<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v-shipper - Docker Volume Migration</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/docker.svg">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <form class="login-form" onsubmit="event.preventDefault(); login();">
            <div class="login-brand">
                <img class="brand-icon login-brand-icon" src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/docker.svg" alt="Docker">
                <h2>v-shipper</h2>
            </div>
            <p class="login-copy">Docker Volume Migration</p>
            
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn success" style="width: 100%;">Login</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <header>
            <div class="container">
                <div class="header-inner">
                    <div class="header-brand">
                        <img class="brand-icon" src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/docker.svg" alt="Docker">
                        <h1>v-shipper</h1>
                    </div>
                    <div class="header-tools">
                        <button class="btn tonal" onclick="runTroubleshootCleanup()">🧹 Cleanup</button>
                        <button class="btn tonal" id="themeToggleButton" onclick="toggleTheme()">🎨 System</button>
                        <button class="btn tonal" onclick="loadPools()" title="Refresh">🔄</button>
                    </div>
                    <div class="header-user-section">
                        <span class="header-user">👤 <strong id="currentUser">admin</strong></span>
                        <button class="btn danger" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="main-layout">
                <!-- Left sidebar: Pools -->
                <div class="pools-sidebar">
                    <h2>📁 Storage Pools</h2>
                    <div id="poolsList"></div>
                </div>

                <!-- Center: Volumes -->
                <div class="volumes-section">
                    <div id="volumesContainer">
                        <div class="placeholder">
                            <p>Select a pool to view volumes</p>
                        </div>
                    </div>
                </div>

                <!-- Right sidebar: Task Progress -->
                <div class="progress-sidebar">
                    <h3>📊 Tasks</h3>
                    <div id="progressPanel">
                        <div class="placeholder-text">No active tasks</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->

    <!-- Volumes Modal -->
    <div id="volumesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Volumes</h3>
                <button class="close-btn" onclick="closeModal('volumesModal')">×</button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <!-- Migrate Modal -->
    <div id="migrateModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Backup Modal -->
    <div id="backupModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Progress Modal -->
    <div id="progressModal" class="modal">
        <div class="modal-content">
            <!-- Content populated by JavaScript -->
        </div>
    </div>

    <!-- Conflict Resolution Modal -->
    <div id="conflictModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Volume Already Exists</h3>
                <button class="close-btn" onclick="abortConflict()">×</button>
            </div>
            <div id="conflictModalBody" class="modal-body"></div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="taskDetailModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="taskDetailTitle">Task Details</h3>
                <button class="close-btn" onclick="closeTaskDetail()">×</button>
            </div>
            <div id="taskDetailBody" class="modal-body"></div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/static/main.js"></script>
</body>
</html>
